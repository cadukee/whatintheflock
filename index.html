<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What The Flock</title>
    <!-- Import fonts -->
    <link href="https://fonts.cdnfonts.com/css/ocr-a-std" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: black;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .buttons {
            display: flex;
            gap: 6rem;
            margin-bottom: 3rem;
        }

        .button {
            font-family: 'OCR-A Std', monospace;
            font-size: 1.875rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .enter {
            color: rgb(239, 68, 68);
        }

        .exit {
            color: rgb(59, 130, 246);
        }

        .button:hover {
            transform: scale(1.1);
        }

        .enter:hover {
            color: rgb(248, 113, 113);
        }

        .exit:hover {
            color: rgb(96, 165, 250);
        }

        .text {
            font-family: 'VT323', monospace;
            color: rgb(34, 197, 94);
            text-align: center;
            max-width: 28rem;
            line-height: 1.7;
            font-size: 1.125rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="buttons">
            <span class="button enter">ENTER</span>
            <span class="button exit">EXIT</span>
        </div>
        <p class="text">
            I exist in 4,000 cities across 42 states. 
            I cover more than 70% of the entire U.S. population. 
            I see you every single day, but have you ever even noticed me? 
            Enter now to figure out what the flock is going on.
        </p>
    </div>
</body>
</html>
